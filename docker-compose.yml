version: "3.9"

# =============================================================================
# Belgrade Parking — docker-compose
#
# Services:
#   db        — PostgreSQL 15 with schema auto-applied on first boot
#   redis     — Redis 7 for live cache + pub/sub
#   scraper   — Python scraper (parking data every 60s, events daily)
#   api       — FastAPI backend on port 8000
#   dashboard — Streamlit analytics on port 8501 (comment out if not needed)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: bp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-parking}
      POSTGRES_USER:     ${POSTGRES_USER:-parking}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parking} -d ${POSTGRES_DB:-parking}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: bp_scraper
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-parking}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parking}
      REDIS_URL:    redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount scraper directory for easier local iteration without rebuild
      - ./scraper:/app

  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bp_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-parking}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parking}
      REDIS_URL:    redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app

  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: bp_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      # Dashboard uses plain psycopg2 (sync), so no +asyncpg
      DATABASE_URL: postgresql://${POSTGRES_USER:-parking}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parking}
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dashboard:/app

volumes:
  postgres_data:
  redis_data:
